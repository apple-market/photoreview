<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM_BY Отчеты</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
}

header {
  text-align: center;
  padding: 16px;
  font-size: 22px;
  background: black;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  padding: 12px;
}

@media (min-width: 600px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  display: block;
}

.info {
  padding: 10px;
}

.name {
  font-weight: bold;
  font-size: 14px;
}

.city {
  color: #aaa;
  font-size: 12px;
}
</style>
</head>

<body>

<header>AM_BY • ОТЧЕТЫ</header>

<div class="grid" id="gallery"></div>

<script>
const data = [
  { img: "1.jpg", name: "Олег", city: "Амстердам" },
  { img: "2.jpg", name: "Макс", city: "Киев" },
  { img: "3.jpg", name: "Ирина", city: "Варшава" }
];

const container = document.getElementById('gallery');

data.forEach(item => {
  const div = document.createElement('div');
  div.className = 'card';

  div.innerHTML = `
    <img src="${item.img}">
    <div class="info">
      <div class="name">${item.name}</div>
      <div class="city">${item.city}</div>
    </div>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
